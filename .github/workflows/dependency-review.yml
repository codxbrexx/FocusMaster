name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - '**/package.json'
      - '**/package-lock.json'

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce packages with these severity levels
          fail-on-severity: high
          # Allow licenses used in your existing stack
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
          # Post a summary comment on the PR automatically
          comment-summary-in-pr: always
