name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-flight runs for the same branch/PR to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend: unit tests (Jest + MongoMemoryServer) ───────────────────
  backend-tests:
    name: Backend — Jest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      JWT_SECRET: testsecret-longkey-for-jwt-ci-1234
      # MONGO_URI intentionally omitted — tests use MongoMemoryServer
      GOOGLE_CLIENT_ID: placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test

  # ── 2. Frontend: type-check + lint + Vitest unit tests ──────────────────
  frontend-unit:
    name: Frontend — Lint & Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests
        run: npm test -- --run
